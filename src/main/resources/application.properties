spring.datasource.url=jdbc:h2:mem:unidad5ej7;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=sa

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JWT (prefijo app.jwt.* para @ConfigurationProperties o @Value) ---
# Riesgo: no commitear secretos reales. En despliegue usar JWT_SECRET (o APP_JWT_SECRET con binding relajado)
# fuera del repositorio; no volcar el secreto en logs.
app.jwt.expiration-ms=86400000

app.jwt.secret=mi_clave_super_segura_de_minimo_32_bytes_123456
app.jwt.algorithm=HS256

app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000